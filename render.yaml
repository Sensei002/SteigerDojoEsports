# Render.com Blueprint — static site for SteigerDojoEsports (React/Vite SPA + Match Control).
# Dashboard: New > Blueprint > connect this repo. Render reads this file.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: steigerdojoesports
    runtime: static
    # --include=dev forces typescript/vite (devDependencies) to install even though
    # Render sets NODE_ENV=production; without it `tsc && vite build` would fail.
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false

    # SPA fallback. Render serves existing files BEFORE applying rewrites, so the
    # real files under /matchcontrol/** (copied verbatim from public/) are served
    # directly; only file-less React routes fall through to index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      - path: /matchcontrol/*.html
        name: Cache-Control
        value: no-cache
      - path: /matchcontrol/overlay/*
        name: Cache-Control
        value: no-cache

    # Build-time env vars. sync:false => set the values in the Render dashboard,
    # they are NOT stored in this repo. Copy them from your local .env.
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_FIREBASE_DATABASE_URL
        sync: false
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET
        sync: false
