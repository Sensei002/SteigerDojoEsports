<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Roster · STGR</title>
<link rel="stylesheet" href="../css/overlay.css">
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../js/store.js"></script>
<script src="../js/overlay-common.js"></script>
</head>
<body>
<div class="stage">
  <div class="roster" id="roster">
    <div class="soon-bg" aria-hidden="true">
      <span class="ssb ssb-1"></span><span class="ssb ssb-2"></span><span class="ssb ssb-3"></span>
    </div>
    <div class="roster-head">
      <img class="logo" id="logo" alt="">
      <div><div class="sub" id="sub">ROSTER</div><div class="ttl" id="title">TEAM</div></div>
    </div>
    <div class="roster-bar" id="bar"></div>
    <div class="players" id="players"></div>
  </div>
</div>
<audio id="bgm" loop preload="auto"></audio>

<script>
const $ = function (id) { return document.getElementById(id); };

// When the displayed team changes WHILE the roster is on screen, we fade the
// current line-up out and then play the entrance for the new one — instead of
// just swapping values in place. EXIT_MS covers the container fade-out
// (.4s base / .6s under the "cinematic" motion style; 480ms reads as a clean
// cross-fade in every case).
const EXIT_MS = 480;
let shown = false;        // is .show currently applied
let curKey = '';          // content currently displayed
let swapTimer = null;     // pending out->in swap

let integrations = {};    // { statsProxy, statsEnabled } — live stats config

Store.subscribe('', function (val) {
  const st = Store.withDefaults(val);
  OV.applyTheme(st.theme);
  integrations = st.integrations || {};

  // animated backdrop preset — shared with Starting Soon (set in Settings), so
  // roster, bracket and Starting Soon always match. Falls back to 'carbon'.
  const ssBg = (st.startingSoon || {}).bg;
  const bgOk = OV.SS_BACKGROUNDS.some(function (b) { return b.key === ssBg; });
  document.documentElement.setAttribute('data-ss-bg', bgOk ? ssBg : 'carbon');

  const r = st.roster;
  const t = OV.team(st, r.team || 'A');
  const visible = !!(r.visible && t);

  OV.bgm(st.audio, visible);               // looping background music while shown

  if (!visible) {                          // hide: fade out, stay hidden
    if (swapTimer) { clearTimeout(swapTimer); swapTimer = null; }
    $('roster').classList.remove('show');
    shown = false;
    return;
  }

  const team = r.team || 'A';

  // Player-card accent edge follows the same ATK/DEF name colors as the
  // scorebug, based on the side the displayed team is currently playing.
  // Set live (a plain CSS-var swap) so flipping sides recolors without a
  // full re-render of the line-up.
  const aSide = st.match.sideA || 'ATK';
  const teamSide = team === 'A' ? aSide : (aSide === 'ATK' ? 'DEF' : 'ATK');
  document.documentElement.style.setProperty('--player-accent',
    teamSide === 'ATK' ? 'var(--name-atk, var(--teamcolor))' : 'var(--name-def, var(--teamcolor))');

  const key = contentKey(team, t);

  if (!shown) {
    // entering from hidden — render and play the entrance once
    if (swapTimer) { clearTimeout(swapTimer); swapTimer = null; }
    render(team, t);
    curKey = key;
    enter();
  } else if (key !== curKey) {
    // changed while on screen — fade the old one out, then bring the new one in
    if (swapTimer) clearTimeout(swapTimer);
    $('roster').classList.remove('show');
    shown = false;
    swapTimer = setTimeout(function () {
      swapTimer = null;
      render(team, t);
      curKey = key;
      enter();
    }, EXIT_MS);
  }
  // else: visible and unchanged — leave it (don't replay the entrance)
});

// add .show (with a reflow so re-adding after a fade-out restarts the animation)
function enter() {
  const el = $('roster');
  void el.offsetWidth;
  el.classList.add('show');
  shown = true;
}

// signature of what's on screen — team + name/logo + the player set.
// platform is included so editing a player's stat platform re-renders.
function contentKey(team, t) {
  const players = (t.players || []).filter(function (p) { return p && p.name; });
  return team + '|' + (t.name || '') + '|' + (t.logo || '') + '|' +
    players.map(function (p) { return p.name + ':' + p.role + ':' + (p.platform || 'ubi'); }).join('|');
}

function render(team, t) {
  const color = t.color || (team === 'B' ? 'var(--teamB)' : 'var(--teamA)');
  document.documentElement.style.setProperty('--teamcolor', color);

  $('logo').src = t.logo || OV.px();
  $('logo').style.display = t.logo ? '' : 'none';
  $('title').textContent = t.name || 'TEAM';
  $('sub').textContent = 'STARTING LINE-UP';

  const players = (t.players || []).filter(function (p) { return p && p.name; });
  const useStats = !!(integrations.statsProxy && integrations.statsEnabled !== false);

  $('players').innerHTML = players.map(function (p, i) {
    return '<div class="player' + (useStats ? ' has-stats' : '') + '" style="--d:' + (i * 0.09) + 's">' +
      '<div class="ign">' + OV.esc(p.name) + '</div>' +
      '<div class="role">' + OV.esc(p.role || 'Player') + '</div>' +
      (useStats ? statBlock(i) : '') +
      '</div>';
  }).join('') || '<div class="player"><div class="ign">No players</div></div>';

  // Kick off live-stat fetches AFTER the cards are in the DOM so the entrance
  // animation never waits on the network. Each fills in independently.
  if (useStats) players.forEach(function (p, i) { loadStats(i, p); });
}

// 2×2 grid of stat slots, placeholders shown until data arrives.
function statBlock(i) {
  return '<div class="pstats" id="ps' + i + '">' +
    statCell('K/D', 'kd') + statCell('HS%', 'hs') +
    statCell('WIN', 'winRate') + statCell('KOST', 'kost') +
    '</div>';
}
function statCell(label, key) {
  return '<div class="pstat" data-k="' + key + '">' +
    '<span class="pv">·</span><span class="pl">' + label + '</span></div>';
}

/* ---- live stats fetch (via the Cloudflare Worker proxy) ------------------ *
 * Per-IGN cached in sessionStorage for ~10 min so re-shows are instant and we
 * stay friendly to the proxy. Failures degrade to "—" — never blocks the card.
 * ------------------------------------------------------------------------- */
const STATS_TTL = 10 * 60 * 1000;

function loadStats(i, p) {
  const platform = p.platform || 'ubi';
  const cacheKey = 'stgr_stat_' + platform + '_' + p.name.toLowerCase();
  const cached = readCache(cacheKey);
  if (cached) { fillStats(i, cached); return; }

  const base = String(integrations.statsProxy || '').replace(/\/+$/, '');
  const url = base + '/?platform=' + encodeURIComponent(platform) + '&name=' + encodeURIComponent(p.name);

  fetch(url).then(function (r) { return r.json(); }).then(function (d) {
    const stats = (d && d.ok && d.stats) ? d.stats : { kd: null, hs: null, winRate: null, kost: null };
    writeCache(cacheKey, stats);
    fillStats(i, stats);
  }).catch(function () {
    fillStats(i, { kd: null, hs: null, winRate: null, kost: null });
  });
}

function fillStats(i, stats) {
  const box = document.getElementById('ps' + i);
  if (!box) return;
  Array.prototype.forEach.call(box.querySelectorAll('.pstat'), function (cell) {
    const v = stats[cell.getAttribute('data-k')];
    cell.querySelector('.pv').textContent = (v == null || v === '') ? '—' : v;
  });
}

function readCache(key) {
  try {
    const raw = sessionStorage.getItem(key);
    if (!raw) return null;
    const o = JSON.parse(raw);
    if (!o || (Date.now() - o.t) > STATS_TTL) return null;
    return o.s;
  } catch (e) { return null; }
}
function writeCache(key, stats) {
  try { sessionStorage.setItem(key, JSON.stringify({ t: Date.now(), s: stats })); } catch (e) {}
}
</script>
</body>
</html>
