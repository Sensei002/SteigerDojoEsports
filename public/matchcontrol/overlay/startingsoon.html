<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Starting Soon · STGR</title>
<link rel="stylesheet" href="../css/overlay.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,600;0,700;1,600;1,700&family=Bebas+Neue&family=Orbitron:wght@600;800&family=Oswald:wght@500;700&family=Rajdhani:wght@600;700&family=Saira+Condensed:ital,wght@0,600;0,700;1,600;1,700&family=Teko:wght@500;700&display=swap">
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../js/store.js"></script>
<script src="../js/overlay-common.js"></script>
</head>
<body>
<div class="stage">
  <div class="soon" id="soon">
    <div class="soon-bg" aria-hidden="true">
      <span class="ssb ssb-1"></span><span class="ssb ssb-2"></span><span class="ssb ssb-3"></span>
    </div>
    <img class="soon-event" id="eventLogo" alt="">
    <div class="soon-title" id="title">STARTING SOON</div>
    <div class="soon-sub" id="sub"></div>

    <div class="soon-timer" id="timerWrap"><span id="clock">10:00</span></div>

    <div class="soon-teams" id="teams">
      <div class="soon-team left">
        <img class="logo" id="logoA" alt="">
        <div class="tname" id="nameA">TEAM A</div>
      </div>
      <div class="soon-vs">VS</div>
      <div class="soon-team right">
        <img class="logo" id="logoB" alt="">
        <div class="tname" id="nameB">TEAM B</div>
      </div>
    </div>
  </div>
</div>
<audio id="bgm" loop preload="auto"></audio>

<script>
const $ = function (id) { return document.getElementById(id); };
let ss = {};

Store.subscribe('', function (val) {
  const st = Store.withDefaults(val);
  OV.applyTheme(st.theme);
  ss = st.startingSoon || {};
  const A = OV.team(st, 'A'), B = OV.team(st, 'B');

  // animated backdrop preset (falls back to 'carbon' if unset/unknown)
  const bgOk = OV.SS_BACKGROUNDS.some(function (b) { return b.key === ss.bg; });
  document.documentElement.setAttribute('data-ss-bg', bgOk ? ss.bg : 'carbon');

  OV.bgm(st.audio, !!ss.visible);          // looping background music while shown

  $('soon').classList.toggle('show', !!ss.visible);

  const colorA = (A && A.color) || 'var(--teamA)';
  const colorB = (B && B.color) || 'var(--teamB)';
  document.documentElement.style.setProperty('--ssA', colorA);
  document.documentElement.style.setProperty('--ssB', colorB);

  $('nameA').textContent = A ? A.name : 'TEAM A';
  $('nameB').textContent = B ? B.name : 'TEAM B';
  $('logoA').src = (A && A.logo) || OV.px();
  $('logoB').src = (B && B.logo) || OV.px();
  $('logoA').style.visibility = (A && A.logo) ? '' : 'hidden';
  $('logoB').style.visibility = (B && B.logo) ? '' : 'hidden';

  // scorebug branding image, sat on top
  const logo = (st.branding && st.branding.eventLogo) || '';
  if (logo) { $('eventLogo').src = logo; $('eventLogo').style.display = ''; }
  else { $('eventLogo').removeAttribute('src'); $('eventLogo').style.display = 'none'; }

  $('title').textContent = ss.title || 'STARTING SOON';
  $('sub').textContent = ss.subtitle || '';
  $('sub').style.display = ss.subtitle ? '' : 'none';
  $('timerWrap').style.display = (ss.showTimer !== false) ? '' : 'none';

  renderClock();
});

function liveRemaining() {
  if (ss.timerRunning && ss.timerEndsAt) {
    return Math.max(0, Math.round((ss.timerEndsAt - Date.now()) / 1000));
  }
  return Math.max(0, parseInt(ss.timerRemaining, 10) || 0);
}
function renderClock() {
  const total = liveRemaining();
  const m = Math.floor(total / 60), s = total % 60;
  $('clock').textContent = m + ':' + String(s).padStart(2, '0');
  $('timerWrap').classList.toggle('zero', total === 0);
}
// smooth local tick — no database writes needed while counting down
setInterval(renderClock, 250);
</script>
</body>
</html>
