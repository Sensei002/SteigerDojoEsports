<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Round History · STGR</title>
<link rel="stylesheet" href="../css/overlay.css">
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../js/store.js"></script>
<script src="../js/overlay-common.js"></script>
</head>
<body>
<div class="stage">
  <div class="roundhistory" id="rh">
    <div class="rh-head">
      <div class="rh-team left">
        <img class="logo" id="logoA" alt="">
        <div class="tname" id="nameA">TEAM A</div>
      </div>
      <div class="rh-title">ROUND HISTORY</div>
      <div class="rh-team right">
        <div class="tname" id="nameB">TEAM B</div>
        <img class="logo" id="logoB" alt="">
      </div>
    </div>
    <div class="rh-bar"></div>
    <div class="rh-rows" id="rows"></div>
  </div>
</div>

<script>
const $ = function (id) { return document.getElementById(id); };
let lastKey = '';

Store.subscribe('', function (val) {
  const st = Store.withDefaults(val);
  OV.applyTheme(st.theme);
  const rh = st.roundHistory;
  const A = OV.team(st, 'A'), B = OV.team(st, 'B');

  const visible = rh.visible && (A || B);
  $('rh').classList.toggle('show', !!visible);
  if (!visible) return;

  const colorA = (A && A.color) || 'var(--teamA)';
  const colorB = (B && B.color) || 'var(--teamB)';
  document.documentElement.style.setProperty('--rhA', colorA);
  document.documentElement.style.setProperty('--rhB', colorB);

  $('nameA').textContent = A ? (A.short || A.name) : 'TEAM A';
  $('nameB').textContent = B ? (B.short || B.name) : 'TEAM B';
  $('logoA').src = (A && A.logo) || OV.px();
  $('logoB').src = (B && B.logo) || OV.px();
  $('logoA').style.visibility = (A && A.logo) ? '' : 'hidden';
  $('logoB').style.visibility = (B && B.logo) ? '' : 'hidden';

  const entries = toArr(rh.entries);
  const teamLogo = function (code) { const t = code === 'B' ? B : A; return (t && t.logo) || ''; };
  const teamShort = function (code) { const t = code === 'B' ? B : A; return (t && (t.short || t.name)) || ('TEAM ' + code); };

  // re-render only when the data changes (keeps entrance animation clean)
  const key = entries.map(function (e) { return e.team + '|' + e.map + '|' + e.site; }).join('||');
  if (key === lastKey) return;
  const grew = key.indexOf(lastKey) === 0 && lastKey !== '';   // an entry was appended
  lastKey = key;

  $('rows').innerHTML = entries.map(function (e, i) {
    const side = e.team === 'B' ? 'b' : 'a';
    const logo = teamLogo(e.team);
    const where = [e.map, e.site].filter(Boolean).join(' · ') || '—';
    const fresh = (grew && i === entries.length - 1) ? ' just' : '';
    return '<div class="rh-row ' + side + fresh + '" style="--d:' + (grew ? 0 : i * 0.05) + 's">' +
      '<div class="rh-rnum">R' + (i + 1) + '</div>' +
      (logo ? '<img class="rh-rlogo" src="' + OV.esc(logo) + '" alt="">' : '<div class="rh-rlogo"></div>') +
      '<div class="rh-rteam">' + OV.esc(teamShort(e.team)) + '</div>' +
      '<div class="rh-rwhere">' + OV.esc(where) + '</div>' +
      '</div>';
  }).join('') || '<div class="rh-empty">Waiting for first round…</div>';
});

function toArr(v) {
  if (Array.isArray(v)) return v.filter(function (x) { return x != null; });
  if (v && typeof v === 'object') return Object.keys(v).map(function (k) { return v[k]; }).filter(function (x) { return x != null; });
  return [];
}
</script>
</body>
</html>
