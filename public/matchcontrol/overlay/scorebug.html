<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Scorebug · STGR</title>
<link rel="stylesheet" href="../css/overlay.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:ital,wght@0,600;0,700;1,600;1,700&family=Bebas+Neue&family=Orbitron:wght@600;800&family=Oswald:wght@500;700&family=Rajdhani:wght@600;700&family=Saira+Condensed:ital,wght@0,600;0,700;1,600;1,700&family=Teko:wght@500;700&display=swap">
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../js/store.js"></script>
<script src="../js/overlay-common.js"></script>
</head>
<body>
<div class="stage">
  <div class="scorebug" id="bug">
    <div class="sb-team left" id="teamA">
      <img class="logo" id="logoA" alt="">
      <div class="info"><div class="tname" id="nameA">TEAM A</div>
        <div class="subrow"><div class="pips" id="pipsA"></div><div class="tside" id="sideA">ATK</div></div></div>
      <div class="sb-bar-color" id="barA"></div>
    </div>
    <div class="sb-score left"><div class="s" id="scoreA">0</div></div>
    <div class="sb-center" id="center"><img class="sb-event-logo" id="eventLogo" alt=""></div>
    <div class="sb-score right"><div class="s" id="scoreB">0</div></div>
    <div class="sb-team right" id="teamB">
      <img class="logo" id="logoB" alt="">
      <div class="info"><div class="tname" id="nameB">TEAM B</div>
        <div class="subrow"><div class="tside" id="sideB">DEF</div><div class="pips" id="pipsB"></div></div></div>
      <div class="sb-bar-color" id="barB"></div>
    </div>
  </div>
  <div class="sb-mapcard" id="mapCard">
    <div class="mc-img-wrap"><img class="mc-img" id="mcImg" alt=""></div>
    <div class="mc-meta"><div class="mc-name" id="mcName"></div></div>
  </div>
  <div class="sb-msg" id="scoreMsg"><span class="sb-msg-text" id="scoreMsgText"></span></div>
</div>

<script>
const $ = function (id) { return document.getElementById(id); };
let prevA = null, prevB = null, prevShow = false, prevLogo = null;
// map-card state (declared before subscribe — the localStorage backend fires synchronously)
let mcInit = false, mcPrevPlay = 0, mcTimer = null, mcTiming = false;
let mcLast = { show: false, visible: false, map: '' };

Store.subscribe('', function (val) {
  const st = Store.withDefaults(val);
  OV.applyTheme(st.theme);
  const m = st.match;
  const A = OV.team(st, 'A'), B = OV.team(st, 'B');

  // visibility: show when teams set and not hidden
  const show = (m.visible !== false) && (A || B);
  $('bug').classList.toggle('show', !!show);

  // names / logos / colors
  $('nameA').textContent = A ? A.name : 'TEAM A';
  $('nameB').textContent = B ? B.name : 'TEAM B';
  $('logoA').src = (A && A.logo) || OV.px();
  $('logoB').src = (B && B.logo) || OV.px();
  $('barA').style.setProperty('--tcolor', (A && A.color) || 'var(--teamA)');
  $('barB').style.setProperty('--tcolor', (B && B.color) || 'var(--teamB)');

  // round-history pips (colored by the side the team held when winning)
  renderPips($('pipsA'), 'A', m.rounds);
  renderPips($('pipsB'), 'B', m.rounds);

  // scores (update text first, then animate any increase)
  const sA = m.scoreA || 0, sB = m.scoreB || 0;
  $('scoreA').textContent = sA;
  $('scoreB').textContent = sB;
  if (prevShow && show) {
    if (prevA !== null && sA > prevA) scored('A');
    if (prevB !== null && sB > prevB) scored('B');
  }
  prevA = sA; prevB = sB; prevShow = show;

  // sides (B is opposite of A)
  const aSide = m.sideA || 'ATK';
  const bSide = aSide === 'ATK' ? 'DEF' : 'ATK';
  $('sideA').textContent = aSide;
  $('sideB').textContent = bSide;
  paintSide($('teamA'), $('sideA'), aSide);
  paintSide($('teamB'), $('sideB'), bSide);

  // event logo in the center of the bar (replaces the old "Best of" badge)
  const b = st.branding || {};
  const logo = b.eventLogo || '';
  $('center').classList.toggle('empty', !logo);
  if (logo !== prevLogo) {
    if (logo) $('eventLogo').src = logo; else $('eventLogo').removeAttribute('src');
    prevLogo = logo;
  }

  // far-right message (e.g. event name) — custom font + style
  const sm = st.scoreMsg || {};
  const smShow = show && sm.visible && (sm.text || '').trim();
  $('scoreMsg').classList.toggle('show', !!smShow);
  if (smShow) {
    const t = $('scoreMsgText');
    t.textContent = sm.text;
    t.style.fontFamily = OV.fontStack(sm.font || 'bebas');
    t.style.fontWeight = sm.bold ? '800' : '600';
    t.style.fontStyle = sm.italic ? 'italic' : 'normal';
    t.style.textTransform = (sm.uppercase !== false) ? 'uppercase' : 'none';
    t.style.letterSpacing = (sm.font === 'bebas' || sm.font === 'anton') ? '1.5px' : '.5px';
  }

  // far-left map card — pinned (mapCard.visible) and/or timed pop (mapCard.play)
  renderMapCard(st, show);
});

/* Map card: shows the current map's thumbnail + name. Slides down when pinned
 * or when a one-shot "Play" is triggered (mapCard.play changes), auto-hiding
 * after mapCard.duration seconds. The first state on load is recorded without
 * replaying, so refreshing the OBS source never re-fires a stale pop. */
function applyMapCard() {
  const down = !!(mcLast.show && mcLast.map && (mcLast.visible || mcTiming));
  $('mapCard').classList.toggle('show', down);
}
function renderMapCard(st, show) {
  const mc = st.mapCard || {};
  const map = (st.match.map || '').trim();
  if (map) { $('mcName').textContent = map; OV.setMapImg($('mcImg'), $('mapCard'), map); }
  mcLast = { show: show, visible: !!mc.visible, map: map };

  const play = mc.play || 0;
  if (!mcInit) { mcInit = true; mcPrevPlay = play; }   // record baseline, don't replay
  else if (play !== mcPrevPlay) {
    mcPrevPlay = play;
    clearTimeout(mcTimer); mcTiming = false;
    if (show && map) {
      mcTiming = true;
      const ms = Math.max(1, Number(mc.duration) || 8) * 1000;
      mcTimer = setTimeout(function () { mcTiming = false; applyMapCard(); }, ms);
    }
  }
  applyMapCard();
}

function paintSide(teamEl, sideEl, side) {
  const c = side === 'ATK' ? 'var(--accent)' : 'var(--accent-2)';
  teamEl.style.setProperty('--side', c);
  sideEl.style.color = c;
  // team-name text color follows the side it's playing (set in Settings)
  teamEl.style.setProperty('--tname-color',
    side === 'ATK' ? 'var(--name-atk, #fff)' : 'var(--name-def, #fff)');
}

function toArr(v) {
  if (Array.isArray(v)) return v.filter(function (x) { return x != null; });
  if (v && typeof v === 'object') return Object.keys(v).map(function (k) { return v[k]; }).filter(function (x) { return x != null; });
  return [];
}
function renderPips(el, team, rounds) {
  const arr = toArr(rounds).filter(function (r) { return r && r.team === team; });
  el.innerHTML = arr.map(function (r) {
    return '<span class="pip ' + ((r.side || 'ATK').toLowerCase()) + '"></span>';
  }).join('');
}

// punch the score number + sweep light across the team that just scored
function scored(side) {
  const scoreEl = (side === 'A' ? $('scoreA') : $('scoreB')).parentElement;
  const teamEl  = side === 'A' ? $('teamA') : $('teamB');
  restart(scoreEl, 'punch', 550);
  restart(teamEl, 'flash', 650);
}
function restart(el, cls, dur) {
  el.classList.remove(cls);
  void el.offsetWidth;            // force reflow so the animation replays
  el.classList.add(cls);
  setTimeout(function () { el.classList.remove(cls); }, dur);
}
</script>
</body>
</html>
